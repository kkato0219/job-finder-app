<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Finder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Job Finder</h1>
        <p>Find your next job</p>

        <div class="search-box">
            <input type="text" id="search-input" placeholder="Search jobs (e.g. frontend)">
            <button id="search-btn">Search</button>
        </div>

        <p id="message"></p>

        <div id="jobs-container" class="jobs-grid"></div>

        <h2>Save Jobs</h2>
        <div id="saved-jobs-container" class="jobs-grid"></div>
    </div>


    <script src="script.js"></script>
</body>
</html>
